name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the verified revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate a manually requested deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Resolve the Pages base path
        shell: bash
        env:
          CONFIGURED_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          if [[ -n "$CONFIGURED_BASE_PATH" ]]; then
            base_path="$CONFIGURED_BASE_PATH"
          elif [[ "$REPOSITORY_NAME" == *.github.io ]]; then
            base_path="/"
          else
            base_path="/$REPOSITORY_NAME/"
          fi
          echo "VITE_BASE_PATH=$base_path" >> "$GITHUB_ENV"

      - name: Build the static application
        run: npm run build

      - name: Upload the generated site only
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
